name: Processar Aulas

# Nome legível de cada execução: mostra o ficheiro e o modo na lista de runs
# e na página de Estado da app.
run-name: >-
  ${{ github.event.inputs.modo == 'consolidar'
      && format('Resumo+Quiz · Unidade {0}', github.event.inputs.unidade)
      || (github.event.inputs.filename != ''
          && format('{0} · {1}', github.event.inputs.filename, github.event.inputs.modo || 'aula')
          || 'Processamento (push)') }}

on:
  push:
    branches:
      - main
    paths:
      - 'cursos/**/_audio/**'
      - 'disciplina-partilhada/_audio/**'
  workflow_dispatch:
    inputs:
      audio_url:
        description: 'URL do áudio (enviado pela PWA via Vercel Blob)'
        required: false
        default: ''
      curso:
        description: 'Pasta da área (ex.: cursos/01-... ou disciplina-partilhada)'
        required: false
        default: ''
      filename:
        description: 'Nome do ficheiro (ex.: U1_Aula01.mp3)'
        required: false
        default: ''
      modo:
        description: 'aula | material | consolidar (gerar resumo+quiz da unidade)'
        required: false
        default: 'aula'
      unidade:
        description: 'Número da unidade (só para modo consolidar)'
        required: false
        default: ''

# Não usamos um grupo de concorrência único: queremos que vários envios
# simultâneos corram em paralelo (um grupo único cancelava os que ficavam em
# fila). As colisões de push são resolvidas com rebase + retry no fim.

permissions:
  contents: write

jobs:
  processar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar ffmpeg e pdftotext
        run: sudo apt-get update && sudo apt-get install -y ffmpeg poppler-utils

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Descarregar áudio enviado (modo upload)
        if: ${{ github.event.inputs.audio_url != '' }}
        env:
          AUDIO_URL: ${{ github.event.inputs.audio_url }}
        run: curl -fsSL "$AUDIO_URL" -o /tmp/ingest-audio

      - name: Processar
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INGEST_AUDIO_PATH: ${{ github.event.inputs.audio_url != '' && '/tmp/ingest-audio' || '' }}
          INGEST_AREA: ${{ github.event.inputs.curso }}
          INGEST_FILENAME: ${{ github.event.inputs.filename }}
          INGEST_MODO: ${{ github.event.inputs.modo }}
          INGEST_UNIDADE: ${{ github.event.inputs.unidade }}
        run: node scripts/processar.mjs

      - name: Commit dos resultados (só os textos, nunca o áudio)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cursos/ disciplina-partilhada/
          git reset -q -- ':(glob)**/_audio/**' 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nada de novo para processar."
            exit 0
          fi
          git commit -m "Processamento automático de aulas"
          # Vários runs podem fazer push ao mesmo tempo: rebase + retry.
          for n in 1 2 3 4 5 6 7 8; do
            if git push origin HEAD:main; then
              echo "push ok (tentativa $n)"; exit 0
            fi
            echo "push falhou (tentativa $n), a rebasear..."
            git pull --rebase -X ours origin main || true
            sleep $((RANDOM % 5 + 2))
          done
          echo "push falhou após várias tentativas"; exit 1
