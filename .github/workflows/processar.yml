name: Processar Aulas

on:
  push:
    branches:
      - main
    paths:
      - 'cursos/**/_audio/**'
      - 'disciplina-partilhada/_audio/**'
  workflow_dispatch:

# Evita corridas simultâneas a fazerem commit ao mesmo tempo.
concurrency:
  group: processar-aulas
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  processar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install --no-audit --no-fund

      - name: Processar áudios novos
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/processar.mjs

      - name: Commit dos resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cursos/ disciplina-partilhada/
          if git diff --staged --quiet; then
            echo "Nada de novo para processar."
          else
            git commit -m "Processamento automático de aulas [skip ci]"
            git push
          fi
