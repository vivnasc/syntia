name: Processar Aulas

# Nome legível de cada execução: mostra o ficheiro e o modo na lista de runs
# e na página de Estado da app.
run-name: >-
  ${{ github.event.inputs.modo == 'mover'
      && format('Mover aula → Unidade {0}', github.event.inputs.unidade)
      || github.event.inputs.modo == 'consolidar'
      && format('Resumo+Quiz · Unidade {0}', github.event.inputs.unidade)
      || (github.event.inputs.filename != ''
          && format('{0} · {1}', github.event.inputs.filename, github.event.inputs.modo || 'aula')
          || 'Processamento (push)') }}

on:
  push:
    branches:
      - main
    paths:
      - 'cursos/**/_audio/**'
      - 'disciplina-partilhada/_audio/**'
  workflow_dispatch:
    inputs:
      audio_url:
        description: 'URL do áudio (enviado pela PWA via Vercel Blob)'
        required: false
        default: ''
      curso:
        description: 'Pasta da área (ex.: cursos/01-... ou disciplina-partilhada)'
        required: false
        default: ''
      filename:
        description: 'Nome do ficheiro (ex.: U1_Aula01.mp3)'
        required: false
        default: ''
      modo:
        description: 'aula | material | consolidar (gerar resumo+quiz da unidade)'
        required: false
        default: 'aula'
      unidade:
        description: 'Número da unidade (modo consolidar ou mover)'
        required: false
        default: ''
      arquivos:
        description: 'JSON com os ficheiros da aula a mover (modo mover)'
        required: false
        default: ''
      legenda:
        description: 'Legenda original do post (modo inspiracao / inspiracao-legenda)'
        required: false
        default: ''

# Não usamos um grupo de concorrência único: queremos que vários envios
# simultâneos corram em paralelo (um grupo único cancelava os que ficavam em
# fila). As colisões de push são resolvidas com rebase + retry no fim.

permissions:
  contents: write
  actions: write   # para disparar o robô de sync (workflow_dispatch) no fim

jobs:
  processar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar ffmpeg e pdftotext
        run: sudo apt-get update && sudo apt-get install -y ffmpeg poppler-utils

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Descarregar áudio enviado (modo upload)
        if: ${{ github.event.inputs.audio_url != '' }}
        env:
          AUDIO_URL: ${{ github.event.inputs.audio_url }}
        run: curl -fsSL "$AUDIO_URL" -o /tmp/ingest-audio

      - name: Processar
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INGEST_AUDIO_PATH: ${{ github.event.inputs.audio_url != '' && '/tmp/ingest-audio' || '' }}
          INGEST_AREA: ${{ github.event.inputs.curso }}
          INGEST_FILENAME: ${{ github.event.inputs.filename }}
          INGEST_MODO: ${{ github.event.inputs.modo }}
          INGEST_UNIDADE: ${{ github.event.inputs.unidade }}
          INGEST_ARQUIVOS: ${{ github.event.inputs.arquivos }}
          INGEST_LEGENDA: ${{ github.event.inputs.legenda }}
        run: node scripts/processar.mjs

      - name: Commit dos resultados (só os textos, nunca o áudio)
        id: commit
        run: |
          # Commita com a identidade da Vivianne (não github-actions[bot]) para o
          # Vercel autorizar o deploy de produção do site — assim cada aula/vídeo
          # processado reconstrói o site e aparece logo (Inspiração, cadeiras…).
          git config user.name "vivnasc"
          git config user.email "61882995+vivnasc@users.noreply.github.com"
          git add cursos/ disciplina-partilhada/
          git add inspiracao/ 2>/dev/null || true
          git reset -q -- ':(glob)**/_audio/**' 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nada de novo para processar."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Processamento automático de aulas"
          # Vários runs podem fazer push ao mesmo tempo: rebase + retry.
          for n in 1 2 3 4 5 6 7 8; do
            if git push origin HEAD:main; then
              echo "push ok (tentativa $n)"
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "push falhou (tentativa $n), a rebasear..."
            git pull --rebase -X ours origin main || true
            sleep $((RANDOM % 5 + 2))
          done
          echo "push falhou após várias tentativas"; exit 1

      # Um push feito com o GITHUB_TOKEN NÃO dispara outros workflows (regra do
      # GitHub). Por isso, quando há aulas novas, disparamos aqui explicitamente
      # o robô que atualiza os conceitos no viviannepag. O workflow_dispatch é a
      # exceção que o GITHUB_TOKEN pode disparar.
      - name: Atualizar o cérebro do viviannepag
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "A disparar a sincronização de conceitos → viviannepag…"
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/sync-cursos-viviannepag.yml/dispatches" \
            -d '{"ref":"main"}' \
            && echo "robô de sync disparado" \
            || echo "não consegui disparar o sync (não é fatal; segue no próximo push)"
