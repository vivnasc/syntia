name: Inspecionar viviannepag (estrutura dos cursos)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/inspecionar-viviannepag.yml'
  workflow_dispatch:

jobs:
  inspecionar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar e inspecionar
        env:
          TOKEN: ${{ secrets.VIVIANNEPAG_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then echo "Sem token."; exit 0; fi
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/vivnasc/viviannepag.git" vp
          cd vp
          echo "=================== cursos.ts ATUAL (ficheiro completo) ==================="
          cat lib/infografico/cursos.ts
          echo
          echo "=================== VALORES VÁLIDOS DE 'Mundo' ==================="
          grep -rnE "type Mundo|Mundo =" lib/estudio-conteudo.ts lib/**/*.ts 2>/dev/null | head -20
          echo "--- linha da definição do tipo Mundo ---"
          grep -rn "Mundo" lib/estudio-conteudo.ts 2>/dev/null | grep -iE "type|=" | head -10
