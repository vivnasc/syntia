name: Inspecionar uso do cursos.ts no viviannepag

# Diagnóstico pontual: confirma se o cursos.ts atual ainda exporta a função
# conceitosDosCursos (usada por 15+ ficheiros). Se o robô a apagou, o build
# parte. Mostra o ficheiro atual e a versão anterior (antes do robô lhe tocar).

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/inspecionar-viviannepag.yml'
  workflow_dispatch:

jobs:
  inspecionar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar o viviannepag e inspecionar
        env:
          TOKEN: ${{ secrets.VIVIANNEPAG_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then echo "Sem token."; exit 0; fi
          git clone "https://x-access-token:${TOKEN}@github.com/vivnasc/viviannepag.git" vp
          cd vp
          echo "=================== EXPORTS DO cursos.ts ATUAL ==================="
          grep -nE "^export |conceitosDosCursos" lib/infografico/cursos.ts || echo "(nenhum export encontrado!)"
          echo
          echo ">>> O cursos.ts ATUAL ainda tem 'conceitosDosCursos'?"
          if grep -q "conceitosDosCursos" lib/infografico/cursos.ts; then echo "SIM — existe"; else echo "NAO — FOI APAGADO (build parte)"; fi
          echo
          echo "=================== HISTÓRICO do cursos.ts ==================="
          git log --oneline -8 -- lib/infografico/cursos.ts
          echo
          echo "=================== VERSÃO ANTERIOR (pai do commit do robô) ==================="
          # o commit do robô é 2ad1ada; o pai é a versão antes de eu tocar
          PARENT=$(git log --pretty=%P -n 1 2ad1ada 2>/dev/null | awk '{print $1}')
          echo "commit anterior: $PARENT"
          echo "--- exports e função conceitosDosCursos na versão anterior ---"
          git show "$PARENT:lib/infografico/cursos.ts" 2>/dev/null | grep -nE "^export |conceitosDosCursos|^function |^const " | head -40
          echo
          echo "--- definição COMPLETA de conceitosDosCursos na versão anterior ---"
          git show "$PARENT:lib/infografico/cursos.ts" 2>/dev/null | awk '/conceitosDosCursos/{f=1} f{print} f&&/^}/{c++} c>=1&&/^}/{exit}' | head -60
          echo
          echo "=================== ÚLTIMO DEPLOY (Vercel) parte? ==================="
          echo "(ver em vercel; aqui só confirmo se o TS compila localmente)"
          if [ -f package.json ]; then
            echo "há package.json; a verificar tsc no ficheiro…"
            grep -c "conceitosDosCursos" lib/infografico/cursos.ts || true
          fi
