name: Sincronizar conceitos → viviannepag

# A cada aula nova (quando as sínteses mudam no main), atualiza os conceitos dos
# cursos no viviannepag (lib/infografico/cursos.ts). Zero cliques.
#
# IMPORTANTE: edita o ficheiro EXISTENTE do viviannepag IN-PLACE — só troca as
# listas de `conceitos`. Preserva tudo o resto (conceitosDosCursos, getCurso,
# imports, comentários). Nunca reescreve o ficheiro todo, para nunca apagar nada.
#
# Requisito ÚNICO (uma vez): o secret VIVIANNEPAG_TOKEN — token com Contents:
# Read and write no vivnasc/viviannepag. Depois disto nunca mais mexes.

on:
  push:
    branches: [main]
    paths:
      - 'cursos/**/sinteses/**'
      - 'disciplina-partilhada/**/sinteses/**'
      - 'scripts/patch-cursos-viviannepag.mjs'
      - 'scripts/gerar-conteudo.mjs'
  workflow_dispatch:

concurrency:
  group: sync-viviannepag
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da Syntia
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerar o saber.json
        run: node scripts/gerar-conteudo.mjs

      - name: Editar o cursos.ts do viviannepag (in-place) e enviar
        env:
          TOKEN: ${{ secrets.VIVIANNEPAG_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "Sem VIVIANNEPAG_TOKEN — salto o push (cria o secret em syntia → Settings → Secrets → Actions)."
            exit 0
          fi
          echo "Token presente (${#TOKEN} caracteres). A clonar o viviannepag…"
          git clone "https://x-access-token:${TOKEN}@github.com/vivnasc/viviannepag.git" vp
          DEST="vp/lib/infografico/cursos.ts"
          if [ ! -f "$DEST" ]; then
            echo "!! $DEST não existe no viviannepag — aborto sem tocar em nada."
            exit 1
          fi
          # Edita SÓ as listas de conceitos no ficheiro existente (preserva o resto).
          node scripts/patch-cursos-viviannepag.mjs "$DEST" public/saber.json > /tmp/cursos.ts
          # Segurança: só aceita o resultado se a conceitosDosCursos continuar lá.
          if ! grep -q "conceitosDosCursos" /tmp/cursos.ts; then
            echo "!! resultado sem conceitosDosCursos — recuso escrever (protejo o build)."
            exit 1
          fi
          cp /tmp/cursos.ts "$DEST"
          cd vp
          if git diff --quiet -- lib/infografico/cursos.ts; then
            echo "Conceitos já iguais — nada a fazer."
            exit 0
          fi
          git config user.name "syntia-bot"
          git config user.email "syntia-bot@users.noreply.github.com"
          git add lib/infografico/cursos.ts
          git commit -m "Conceitos dos cursos atualizados a partir da Syntia (automático)"
          for n in 1 2 3 4; do
            git push origin HEAD:main && { echo "push ok"; exit 0; }
            echo "push falhou ($n), rebase e tento de novo…"
            git pull --rebase -X ours origin main || true
            sleep $((RANDOM % 4 + 2))
          done
          echo "push falhou após várias tentativas"; exit 1
